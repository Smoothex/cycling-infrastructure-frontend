<div class="flex flex-col gap-4">
    <t-date-filter
    [changeableMode]="true"
    [(mode)]="_mode"
    [(selectedYear)]="_selectedYear"
    [(selectedWeekDays)]="_selectedWeekDays"
    [(selectedTrafficTime)]="_selectedTrafficTime"
    [(startTime)]="_startTime"
    [(endTime)]="_endTime"
    [(datetime)]="_datetime$">
    </t-date-filter>
    <intersection-chart [header]="'Chart'" [data]="propertiesFiltered()"/>
    <p-card>
        <div class="flex flex-row gap-4">
            <div class="w-1/3 flex flex-col">
                @if (isNode()) {
                    <h4 class="p-card-title">
                    trafficSignalClusterId <a [routerLink]="['/intersections/trafficSignalCluster', trafficSignalClusterId()]" class="link-button">{{ trafficSignalClusterId() }}</a>
                    </h4>

                    <h5 class="p-card-subtitle">
                        startOsmId {{ startOsmId() }} - endOsmId {{ endOsmId() }}
                    </h5>
                } @else {
                    <h4 class="p-card-title">
                    Weg
                    </h4>
                    <h5 class="p-card-subtitle">
                        prevOsmId {{ prevOsmId() }} - osmId {{ osmId() }} - nextOsmId {{ nextOsmId() }}
                    </h5>
                }
                

                <p-card>
                    <p>
                        Text about inaccuracy of GPS mapping.
                    </p>
                </p-card>
            </div>

            <div class="w-2/3">
                <intersection-map id="intersection-map"
                    [baseData]="intersectionData()"
                    [trafficSignalClusterId]="trafficSignalClusterId()"
                ></intersection-map>
            </div>
        </div>
    </p-card>

    <p-card>
		<p-table [value]="isNode() ? nodeRows() : edgeRows()" [loading]="tableDataIsLoading()"
        [sortField]="'waitingTime'"
		[sortOrder]="-1"
        >
            <ng-template pTemplate="header">
                <tr intersection-list-header
                    [columns]="columns()"
                ></tr>
            </ng-template>

            <ng-template pTemplate="body" let-rowData>
                <tr intersection-list-content 
                    [row]="rowData" 
                    [columns]="columns()"
                    (onAction)="handleZoom($event)">
                </tr>
            </ng-template>
        </p-table>
    </p-card>
</div>
