<div class="flex flex-col gap-4">
    <date-filter-precomputed
    [(selectedYear)]="_selectedYear"
    [(selectedWeekDays)]="_selectedWeekDays"
    [(selectedTrafficTime)]="_selectedTrafficTime"
    />
	<p-card [header]="region()?.name">
        <div class="flex flex-row gap-4">
            <div class="w-1/3 rounded-lg border p-4">
                <table class="simple-table">
                    @if (region(); as r) {
                        <tr>
                            <td>Count</td>
                            <td>{{ r.numberOfRides| number }}</td>
                        </tr>
                        <p-divider/>
                        <tr>
                            <td>Median</td>
                            <td>{{ r.nodeMedianWaitingTime| number: '1.0-2' }}</td>
                        </tr>
                    }
                </table>
            </div>
            <div class="w-2/3">
                <intersection-map id="intersection-map"
                    [regionData]="regionFeature()"
                    [trafficSignalClusterId]="trafficSignalClusterId"
                ></intersection-map>
            </div>
        </div>
	</p-card>
    <p-card header="Charts">
    <div class="flex flex-col gap-20">
        <div class="flex flex-row flex-wrap gap-5">
            <div class="flex-1 flex flex-col">
                <label for="metric" class="font-bold text-sm">Select Metric</label>
                <p-select 
                    id="metric"
                    [options]="propertyOptions"
                    [(ngModel)]="propertyChart"
                    optionLabel="label" 
                    optionValue="value"
                    size="small" />
            </div>

            <div class="flex-1 flex flex-col">
                <label for="buckets" class="font-bold text-sm">Bucket Size</label>
                <p-inputNumber 
                    id="buckets"
                    [(ngModel)]="bucketSize" 
                    [showButtons]="true" 
                    buttonLayout="horizontal"
                    incrementButtonIcon="pi pi-plus" 
                    decrementButtonIcon="pi pi-minus" 
                    [step]="5"
                    [min]="1" 
                    [max]="100"
                    size="small" />
            </div>
            <div class="flex-1 flex flex-col">
                <label for="buckets" class="font-bold text-sm">Offset</label>
                <p-inputNumber 
                    id="buckets"
                    [(ngModel)]="offset" 
                    [showButtons]="true" 
                    buttonLayout="horizontal"
                    incrementButtonIcon="pi pi-plus" 
                    decrementButtonIcon="pi pi-minus" 
                    [step]="5"
                    [min]="0" 
                    [max]="100"
                    size="small" />
            </div>
        </div>
        <div class="flex flex-row flex-wrap gap-10">
                <p-chart class="flex-1"
                    type="bar"
                    [data]="histogram().chart"
                    [options]="histogram().options"
                    height="21rem"
                ></p-chart>
            </div>
        </div>
    </p-card>
    <intersection-chart [data]="nodeProperties()"/>
    <intersection-chart [data]="edgeProperties()"/>
</div>
