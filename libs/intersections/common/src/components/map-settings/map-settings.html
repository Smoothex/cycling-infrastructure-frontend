<p-popover #popoverSettings >
	<div class="popover-container flex flex-col gap-2">
		<p-panel header="Display">
			<div class="flex flex-col gap-2">
				<div>
				<p-checkbox inputId="TrafficSignals" [(ngModel)]="showTrafficSignals" binary="true"/>
				<label for="TrafficSignals" class="ml-2">Display traffic signals</label>
				</div>
				<div>
					<p-checkbox inputId="IntersectionMetrics" [(ngModel)]="showIntersectionMetrics" binary="true"/>
					<label for="IntersectionMetrics" class="ml-2">Display metrics </label>
				</div>
			</div>
			
		</p-panel>
		<p-panel header="Filter">
			<div class="flex flex-col gap-2">
				<p-select 
					[options]="selectableRideIds()"
					[(ngModel)]="selectedRideId"
					optionLabel="label"
					optionValue="id"
					
					[filter]="true"
					filterBy="id"
					(onFilter)="filterRides($event)"
					[showClear]="true"
					placeholder="Select Ride ID"
					
					[virtualScroll]="true" 
					[virtualScrollItemSize]="38"
					scrollHeight="250px"
	
					[lazy]="true"
					(onLazyLoad)="loadRides($event)"
					[loading]="loadingRideIds()"
					size="small"
				>
				</p-select>
				<date-filter-precomputed
				[(selectedYear)]="selectedYear"
				[(selectedWeekDays)]="selectedWeekDays"
				[(selectedTrafficTime)]="selectedTrafficTime">
				</date-filter-precomputed>
			</div>
			
		</p-panel>
	</div>
</p-popover>
<p-popover #popoverInfo >
	<div>
		Info about map. TODO: Write info text.
	</div>
</p-popover>
<div class="map-settings">
	<p-card>
		<div class="flex flex-row gap-2">
			<p-button 
				icon="pi pi-cog"
				size="small"
				severity="secondary"
				[rounded]="true"
				[outlined]="true"
				(click)="popoverSettings.toggle($event)"
			></p-button>
			<p-button 
				icon="pi pi-question"
				size="small"
				severity="secondary"
				[rounded]="true"
				[outlined]="true"
				(click)="popoverInfo.toggle($event)"
			></p-button>
		</div>
	</p-card>
</div>
