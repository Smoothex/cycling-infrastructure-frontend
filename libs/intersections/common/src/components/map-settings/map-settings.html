<p-popover #popoverSettings (onShow)="setSettingVisibility(true)" (onHide)="setSettingVisibility(false)">
	<div class="flex flex-col gap-4 w-80 p-2">
		<div class="flex flex-row">
			<span class="flex-1 font-bold text-m mb-2 block">Settings</span>
			<p-button icon="ph ph-camera" (onClick)="screenshotMode.set(!screenshotMode())" size="small"/>
		</div>

		<settings [isSettingsVisible]="isSettingsVisible()" [settings]="settings()" />
	</div>
	<div class="popover-container flex flex-col gap-2">
		@if (extendedSettings()) {
			<div class="flex flex-col">
				<label class="font-bold text-xs">Select Ride ID</label>
				<p-select 
				[options]="selectableRideIds()"
				[(ngModel)]="selectedRideId"
				optionLabel="label"
				optionValue="id"
				
				[filter]="true"
				filterBy="id"
				(onFilter)="filterRides($event)"
				[showClear]="true"
				
				[virtualScroll]="true" 
				[virtualScrollItemSize]="38"
				scrollHeight="250px"

				[lazy]="true"
				(onLazyLoad)="loadRides($event)"
				[loading]="loadingRideIds()"
				size="small"
			/>
			</div>
		}
	</div>
</p-popover>
<p-popover #popoverInfo >
	<div>
		Info about map. TODO: Write info text.
	</div>
	<p>
		Text about inaccuracy of GPS mapping.
	</p>
</p-popover>
<div class="map-settings" [hidden]="screenshotMode()">
	<p-card>
		<div class="flex flex-row gap-2">
			<p-button 
				icon="pi pi-cog"
				size="small"
				severity="secondary"
				[rounded]="true"
				[outlined]="true"
				(click)="popoverSettings.toggle($event)"
			></p-button>
			<p-button 
				icon="pi pi-question"
				size="small"
				severity="secondary"
				[rounded]="true"
				[outlined]="true"
				(click)="popoverInfo.toggle($event)"
			></p-button>
		</div>
	</p-card>
</div>
