<p-card [header]="header()">
    <div class="flex flex-col gap-20">
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-10">
            @if (loading() ) {
                <p-skeleton height="21rem" />
            } @else {
                <chart-wrapper>
                    <p-chart chart
                        chart
                        type="bar"
                        [data]="chartData().chart" 
                        [options]="chartData().options" 
                        height="21rem" />

                    <div settings class="flex flex-col gap-4">
                        <div class="flex-1 flex flex-col">
                            <label class="font-bold text-sm">Select Metric</label>
                            <p-select 
                                [options]="config().selectableProperties"
                                [(ngModel)]="propertyChart"
                                optionLabel="label" 
                                optionValue="value"
                                size="small" />
                        </div>

                        <div class="flex-1 flex flex-col">
                            <label class="font-bold text-sm">Select Category</label>
                            <p-select 
                                [options]="groupByOptions"
                                [(ngModel)]="groupBy"
                                optionLabel="label" 
                                optionValue="value"
                                size="small" />
                        </div>
                    </div>
                </chart-wrapper>
            }
        </div>
    </div>
</p-card>
