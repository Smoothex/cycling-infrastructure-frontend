<div class="map-legend">
	<p-card>
  	@for (item of items(); track item.label) {
    <div class="legend-row flex items-center">
      @if (item.widthStops) {
        <div class="visual-container flex items-center gap-1">
          @for (stop of item.widthStops; track stop.value) {
            <div
              class="stop-item"
              [style.height.em]="stop.width / 14"
              [style.background]="item.color">
            </div>
          }
        </div>
      } @else {
        <div class="visual-container flex items-center">
          <div
            [class]="getClassForGeometry(item)"
            [style.background]="getColorForGeometry(item)">
          </div>
        </div>
      }

      <div class="text-gray-700 leading-tight">
        {{ item.label }}
      </div>
    </div>
  	}
	</p-card>
</div>
