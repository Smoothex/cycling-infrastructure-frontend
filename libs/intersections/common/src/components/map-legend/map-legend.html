<div class="map-legend">
	<p-card class="w-72">
  	@for (item of items(); track item.label) {
    <div class="flex items-center gap-3 mb-2 last:mb-0">
      @if (item.widthStops) {
        <div class="w-12 flex items-centre gap-1">
          @for (stop of item.widthStops; track stop.value) {
            <div
              class="w-4"
              [style.height.px]="stop.width"
              [style.background]="item.color">
            </div>
          }
        </div>
      } @else {
        <div class="w-12 flex items-centre">
          <div
              [class]="getClassForGeometry(item)"
              [style.background]="getColorForGeometry(item)">
            </div>
        </div>
      }

      <div class="text-sm text-gray-700 leading-tight">
        {{ item.label }}
      </div>
    </div>
  	}
	</p-card>
</div>
