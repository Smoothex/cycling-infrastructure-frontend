<p-card [header]="header()">
    <div class="flex flex-col gap-20">
        <div class="flex flex-row flex-wrap gap-5">
            <p-button label="Load Next Batch" [badge]="'(' + accumulatedData().length  + '/' + totalElements() + ')'" [disabled]="loading()" (onClick)="loadMore()" />
            <p-button label="Load All" [disabled]="loading()" (onClick)="loadAll()" />
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-10">
            @for (chart of charts(); track $index) {  
                @if (loading() ) {
                    <p-skeleton height="21rem" />
                } @else if (chart === 'histogram') {
                    <histogram-chart 
                        [data]="accumulatedData()" 
                        [(selectedMetric)]="propertyChart" 
                        [label]="label()" 
                        [config]="config()"/>
                } @else if (chart === 'boxplot') {
                    <boxplot-chart 
                        [data]="accumulatedData()" 
                        [(selectedMetric)]="propertyChart"  
                        [label]="label()" 
                        [config]="config()"/>
                } @else if (chart === 'scatter-start-time') {
                    <scatter-plot-start-time
                        [data]="accumulatedData()" 
                        [(selectedMetric)]="propertyChart"  
                        [label]="label()" 
                        [config]="config()"/>
                } @else if (chart === 'heatmap-start-time') {
                    <heatmap-start-time-chart
                        [data]="accumulatedData()" 
                        [(selectedMetric)]="propertyChart"  
                        [label]="label()" 
                        [config]="config()"/>
                } @else if (chart === 'heatmap') {
                    <heatmap-chart
                        [data]="accumulatedData()" 
                        [(selectedMetric)]="propertyChart"  
                        [label]="label()"
                        [config]="config()"/>
                } @else if (chart === 'scatter') {
                    <scatter-plot
                        [data]="accumulatedData()" 
                        [(selectedMetric)]="propertyChart"  
                        [label]="label()"
                        [config]="config()"/>
                }
            }
        </div>
    </div>
</p-card>
