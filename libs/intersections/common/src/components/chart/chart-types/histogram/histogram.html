<intersection-chart-wrapper [(isExporting)]="isExporting" [chart]="chart()" [settings]="chartSettings()" [chartFilter]="chartFilter()" [downloadFileName]="downloadFileName()">
    <div label [style.font-size]="isExporting() ? '48px' : '12px'" [style.line-height]="'1.2'">
        @if (chartData().outliers > 0) {
            <div class="flex flex-row items-center justify-center">
                <i class="ph ph-arrows-in-line-horizontal mr-1" style="font-size: 1em"></i>
                <span class="mr-2">Scale: X [{{ minView() ?? 'Start' }}, {{ maxView() ?? 'End' }}], Outliers: {{chartData().outliers}}/{{data().length}}</span>
            </div>
        }
    </div>
</intersection-chart-wrapper>
