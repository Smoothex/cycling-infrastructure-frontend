<chart-wrapper>
    <p-chart chart
        type="scatter" 
        [data]="chartData().chart" 
        [options]="chartData().options" 
        height="21rem" />

    <div settings class="flex flex-col gap-4">
        <div class="flex-1 flex flex-col">
            <label for="metric" class="font-bold text-sm">Select Metric</label>
            <p-select 
                id="metric"
                [options]="config().selectableProperties"
                [(ngModel)]="selectedMetric"
                optionLabel="label" 
                optionValue="value"
                size="small" />
        </div>
    
        <div class="flex-1 flex flex-col">
            <label for="window" class="font-bold text-sm">Half Window</label>
            <p-inputNumber 
                id="window"
                [(ngModel)]="windowSize" 
                [showButtons]="true" 
                buttonLayout="horizontal"
                incrementButtonIcon="pi pi-plus" 
                decrementButtonIcon="pi pi-minus" 
                [step]="10"
                [min]="0" 
                [max]="100"
                size="small" />
        </div>
    </div>
</chart-wrapper>
