<chart-wrapper>
    <p-chart chart
        [type]="$any('boxplot')" 
        [data]="chartData().chart" 
        [options]="chartData().options" 
        height="21rem" />

    <div settings class="flex flex-col gap-4">
        <div class="flex-1 flex flex-col">
            <label for="metric" class="font-bold text-sm">Select Metric</label>
            <p-select 
                id="metric"
                [options]="config().selectableProperties"
                [(ngModel)]="selectedMetric"
                optionLabel="label" 
                optionValue="value"
                size="small" />
        </div>
        <div class="flex-1 flex flex-col">
            <label for="metric" class="font-bold text-sm">Select Category</label>
            <p-select 
                id="metric"
                [options]="groupByOptions"
                [(ngModel)]="groupBy"
                optionLabel="label" 
                optionValue="value"
                size="small" />
        </div>
    </div>
</chart-wrapper>
