<chart-wrapper [(isExporting)]="isExporting" [chart]="chart()" [settings]="chartSettings()" [chartFilter]="chartFilter()" [downloadFileName]="downloadFileName()">
    <div label [style.font-size]="isExporting() ? '48px' : '12px'" [style.line-height]="'1.2'">
        @if (minView() !== null || maxView() !== null) {
            <div class="flex flex-row items-center justify-center">
                <i class="pi pi-search-plus mr-1" style="font-size: 1em"></i>
                <span class="mr-2">View: Y [{{ minView() ?? 'Start' }}, {{ maxView() ?? 'End' }}]</span>
            </div>
        }
    </div> 
</chart-wrapper>
