<chart-wrapper>
    <div label class="flex items-center justify-center w-full px-4 pb-2 mt-1 text-xs text-gray-500 font-medium">
        <span class="mr-2">Low ({{ chartData().minCount || 0 }})</span>
        <div class="w-32 h-3 rounded-sm inferno-gradient shadow-sm"></div>
        <span class="ml-2">High ({{ chartData().maxCount || 0 }})</span>
    </div>

    <p-chart chart
        [type]="$any('matrix')" 
        [data]="chartData().chart" 
        [options]="chartData().options" 
        height="21rem" />

    <div settings class="flex flex-col gap-4">
        <div class="flex-1 flex flex-col">
            <label for="metric" class="font-bold text-sm">Select Metric</label>
            <p-select 
                id="metric"
                [options]="config().selectableProperties"
                [(ngModel)]="selectedMetric"
                optionLabel="label" 
                optionValue="value"
                size="small" />
        </div>
        <div class="flex-1 flex flex-col">
            <label for="buckets" class="font-bold text-sm">Y Bucket Size</label>
            <p-inputNumber 
                id="buckets"
                [(ngModel)]="yBucketSize" 
                [showButtons]="true" 
                buttonLayout="horizontal"
                incrementButtonIcon="pi pi-plus" 
                decrementButtonIcon="pi pi-minus" 
                mode="decimal"
                [minFractionDigits]="0" 
                [maxFractionDigits]="2"
                [step]="5"
                [min]="0" 
                [max]="100"
                size="small" />
        </div>
        <div class="flex-1 flex flex-col">
            <label for="buckets" class="font-bold text-sm">Y Offset</label>
            <p-inputNumber 
                id="buckets"
                [(ngModel)]="yOffset" 
                [showButtons]="true" 
                buttonLayout="horizontal"
                incrementButtonIcon="pi pi-plus" 
                decrementButtonIcon="pi pi-minus" 
                [step]="1"
                [min]="0" 
                [max]="100"
                size="small" />
        </div>
        <div class="flex-1 flex flex-col">
            <label for="buckets" class="font-bold text-sm">Week Bucket</label>
            <p-inputNumber 
                id="buckets"
                [(ngModel)]="weeks" 
                [showButtons]="true" 
                buttonLayout="horizontal"
                incrementButtonIcon="pi pi-plus" 
                decrementButtonIcon="pi pi-minus" 
                mode="decimal"
                [minFractionDigits]="0" 
                [maxFractionDigits]="2"
                [step]="1"
                [min]="0" 
                [max]="100"
                size="small" />
        </div>
    </div>
</chart-wrapper>
