<div class="flex flex-col gap-4">
    <date-filter-precomputed
    [(selectedYear)]="_selectedYear"
    [(selectedWeekDays)]="_selectedWeekDays"
    [(selectedTrafficTime)]="_selectedTrafficTime"
    />
    <intersection-chart [header]="header()" [config]="config" [fetchFn]="isNode() ? loadNodes: loadEdges" [request]="isNode() ? nodeRequest() : edgeRequest()"/>

    <p-card >
        <section>
            <h4 class="p-card-title">trafficSignalClusterId {{trafficSignalClusterId()}}</h4>
        </section>
        <section id="intersection-map">
            <intersection-map
                [metricData]="pagedGeoResponse()?.geoData"
                [trafficSignalClusterId]="trafficSignalClusterId()"
                [loading]="tableDataIsLoading()"
            />
        </section>
    </p-card>

    <p-card>
        @let rows = isNode() ? nodeRows() : edgeRows();
		<p-table 
        [value]="rows"
        [loading]="tableDataIsLoading()"
        [paginator]="true"
        [lazy]="true"
        [rows]="pagedRequest().size"
        [rowsPerPageOptions]="[10, 20, 50]"
        [totalRecords]="totalElements()"
        (onFilter)="onFilterChange($event)"
        (onLazyLoad)="onLazy($event)"
        [resetPageOnSort]="true"
        [sortField]="'medianWaitingTime'"
		[sortOrder]="-1"
        >
            <ng-template pTemplate="header">
                <tr intersection-list-header
                    [columns]="columns()"
                ></tr>
            </ng-template>

            <ng-template pTemplate="body" let-rowData>
                <tr intersection-list-content 
                    [row]="rowData" 
                    [columns]="columns()"
                    (onAction)="handleZoom($event)">
                </tr>
            </ng-template>
        </p-table>
    </p-card>
</div>
