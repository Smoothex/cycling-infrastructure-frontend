<div class="flex flex-col gap-4">
    <date-filter-precomputed
    [(selectedYear)]="_selectedYear"
    [(selectedWeekDays)]="_selectedWeekDays"
    [(selectedTrafficTime)]="_selectedTrafficTime"
    />
    <intersection-chart [data]="propertiesFiltered()"/>

    <p-card >
        <section>
            <h4 class="p-card-title">trafficSignalClusterId {{trafficSignalClusterId()}}</h4>
        </section>
        <section id="intersection-map">
            <intersection-map
                [metricData]="intersectionNodeAggregate()"
                [trafficSignalClusterId]="trafficSignalClusterId()"
            />
        </section>
    </p-card>

    <p-card>
		<p-table [value]="isNode() ? nodeRows() : edgeRows()" [loading]="tableDataIsLoading()"
        [sortField]="'medianWaitingTime'"
		[sortOrder]="-1"
        >
            <ng-template pTemplate="header">
                <tr intersection-list-header
                    [columns]="columns()"
                ></tr>
            </ng-template>

            <ng-template pTemplate="body" let-rowData>
                <tr intersection-list-content 
                    [row]="rowData" 
                    [columns]="columns()"
                    (onAction)="handleZoom($event)">
                </tr>
            </ng-template>
        </p-table>
    </p-card>
</div>
