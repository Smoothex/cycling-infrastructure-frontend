
<div class="intersection-map relative" [class.screenshot-mode]="screenshotMode()">
    <div class="absolute top-4 left-4 z-10 legend-wrapper">
        <intersection-map-legend [items]="legendItems()"/>
    </div>

    @if (loading() || !mapDataLoaded()) {
        <div class="absolute inset-0 z-20 flex items-center justify-center bg-gray-900/20 backdrop-blur-[1px]">
            <p-progressSpinner strokeWidth="4" styleClass="w-12 h-12" />
        </div>
    }

    <div class="absolute bottom-4 left-4 z-10">
        <intersection-map-settings
            [settings]="MapSettingsComponent()"
            [extendedSettings]="false"
            [(screenshotMode)]="screenshotMode"
        />
    </div>
    
    <t-map-component (mapReady)="onMapReady($event)" [isNavigable]="false"></t-map-component>
</div>
