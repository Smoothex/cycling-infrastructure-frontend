<div class="relative w-full">
    <div class="absolute top-4 left-4 z-10">
        <map-legend
            [items]="legendItems()"
        >
        </map-legend>
    </div>

    <div class="absolute bottom-4 left-4 z-10">
        <map-settings
            [(showTrafficSignals)]="showTrafficSignals" 
            [(showIntersectionMetrics)]="showIntersectionMetrics"
            [selectableRideIds]="selectableRideIds()"
            [(selectedRideId)]="selectedRideId"
            [(selectedTrafficTime)]="selectedTrafficTime"
            [(selectedWeekDays)]="selectedWeekDay"
            [(selectedYear)]="selectedYear"
        >    
        </map-settings>
    </div>

    <t-map-component 
        (mapReady)="onMapReady($event)"
        [isNavigable]="true"
        id="intersection-map">
    </t-map-component>
</div>
