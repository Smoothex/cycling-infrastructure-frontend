<div class="relative w-full" [class.screenshot-mode]="screenshotMode()">
    <div class="absolute top-4 left-4 z-10 legend-wrapper">
        <map-legend [items]="legendItems()"/>
    </div>

    <div class="absolute bottom-4 left-4 z-10">
        
        <map-settings
            [settings]="mapSettings()"
            [(screenshotMode)]="screenshotMode"
            [extendedSettings]="true"
            [(selectedRideId)]="selectedRideId"
        />

    </div>

    <t-map-component 
        (mapReady)="onMapReady($event)"
        [isNavigable]="true"
        id="intersection-map">
    </t-map-component>
</div>
