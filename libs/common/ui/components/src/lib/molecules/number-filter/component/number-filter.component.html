<p-columnFilter [field]="field()" [showMenu]="false">
	<ng-template pTemplate="filter">
		<p-inputNumber
            [(ngModel)]="defaultValue"
            (onInput)="onFilterChange()"
			[showButtons]="true"
            [step]="step()"
            [min]="min()"
            [placeholder]="'COMPONENTS.GENERAL.GENERAL.MIN' | translate"
            [inputStyle]="{'maxWidth': '6rem'}"
            styleClass="p-column-filter"
            size="small"
        />
	</ng-template>
</p-columnFilter>
